name: Main CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          
      - name: Basic Tests
        run: pytest -v tests/

  channel-matrix:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: webchat-webhook
            tests: tests/test_webchat_channel.py tests/test_webhook_trigger.py
          - name: slack
            tests: tests/test_slack_channel.py
          - name: signal
            tests: tests/test_signal_channel.py
          - name: matrix
            tests: tests/test_matrix_channel.py
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Channel Tests (${{ matrix.suite.name }})
        run: pytest -q ${{ matrix.suite.tests }}
          
  loc-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Check LOC increase
        shell: pwsh
        run: |
          pwsh scripts/loc_report.ps1
          # Requires workspace\LOC_BASELINE.json
