name: Nightly Integration

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run Script
        run: |
          scripts/selftest_local.ps1
          scripts/perf_baseline.ps1
          scripts/perf_report.ps1
      - name: Report
        run: |
          echo "Checked PERFORMANCE_REPORT.md"
